name: Test & Code Coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-coverage:
    name: Run Tests and Generate Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore ECommerce.sln

      - name: Test & Collect Coverage
        run: dotnet test ECommerce.sln --configuration Release --filter "FullyQualifiedName!~ECommerce.IntegrationTests" --collect:"XPlat Code Coverage" --results-directory ./coverage /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:Exclude="[ECommerce.Contracts]*|[*.Infrastructure]*|[*.Gateway]*|[*.AppHost]*|[ECommerce.ServiceDefaults]*"

      - name: Generate Report
        uses: danielpalme/ReportGenerator-GitHub-Action@v5
        with:
          reports: './coverage/**/coverage.cobertura.xml'
          targetdir: './coveragereport'
          reporttypes: 'Html;MarkdownSummary'
          assemblyfilters: '+*.Domain;+*.Application;+ECommerce.Auditing;+Auditing.Api'
          classfilters: '-ECommerce.Contracts.*;-*Exception;-*Dto;-*Event;-*BaseAuditableEntity;-*BaseEntity'

      - name: Publish Summary
        run: cat ./coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY

      - name: Extract Coverage Percentage
        run: |
          COVERAGE=$(grep -oP '\*\*Line coverage:\*\*\s*\|\s*\K[0-9.]+' ./coveragereport/Summary.md | head -1)
          if [ -z "$COVERAGE" ]; then COVERAGE="0"; fi
          echo "COVERAGE_PERCENTAGE=$COVERAGE" >> $GITHUB_ENV

      - name: Create Coverage Badge
        uses: Schneegans/dynamic-badges-action@v1.7.0
        if: github.ref == 'refs/heads/main'
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.GIST_ID }}
          filename: coverage.json
          label: Test Coverage
          message: ${{ env.COVERAGE_PERCENTAGE }}%
          color: green
