# =============================================================================
# E-Commerce Microservices Platform
# =============================================================================
# Usage:
#   docker compose up -d
# =============================================================================

networks:
  ecommerce-net:

volumes:
  postgres-data:
  rabbitmq-data:
  valkey-data:
  keycloak-data:
  prometheus-data:

services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  valkey:
    image: valkey/valkey:9.1-alpine
    command: ["valkey-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - valkey-data:/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./src/Orchestration/ECommerce.AppHost/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak-data:/opt/keycloak/data
    command: ["start-dev", "--import-realm"]
    ports:
      - "8081:8080"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'exec 3<>/dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Microservices ──────────────────────────────────────────────────────────

  ordering-api:
    image: ecommerce-ordering-api:latest
    build:
      context: .
      dockerfile: src/Services/Ordering/Ordering.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__OrderingDb: "Host=postgres;Database=ordering_db;Username=postgres;Password=postgres"
      ConnectionStrings__rabbitmq: "amqp://guest:guest@rabbitmq:5672"
      ConnectionStrings__valkey: "valkey:6379"
      Jwt__Authority: "http://keycloak:8080/realms/ecommerce"
      Jwt__ValidateIssuer: "false"
      Services__InventoryApi: "http://inventory-api:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: ordering-api
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  inventory-api:
    image: ecommerce-inventory-api:latest
    build:
      context: .
      dockerfile: src/Services/Inventory/Inventory.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__InventoryDb: "Host=postgres;Database=inventory_db;Username=postgres;Password=postgres"
      ConnectionStrings__rabbitmq: "amqp://guest:guest@rabbitmq:5672"
      ConnectionStrings__valkey: "valkey:6379"
      Jwt__Authority: "http://keycloak:8080/realms/ecommerce"
      Jwt__ValidateIssuer: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: inventory-api
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  payments-api:
    image: ecommerce-payments-api:latest
    build:
      context: .
      dockerfile: src/Services/Payments/Payments.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PaymentsDb: "Host=postgres;Database=payments_db;Username=postgres;Password=postgres"
      ConnectionStrings__rabbitmq: "amqp://guest:guest@rabbitmq:5672"
      ConnectionStrings__valkey: "valkey:6379"
      Jwt__Authority: "http://keycloak:8080/realms/ecommerce"
      Jwt__ValidateIssuer: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: payments-api
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  fulfillment-api:
    image: ecommerce-fulfillment-api:latest
    build:
      context: .
      dockerfile: src/Services/Fulfillment/Fulfillment.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__FulfillmentDb: "Host=postgres;Database=fulfillment_db;Username=postgres;Password=postgres"
      ConnectionStrings__rabbitmq: "amqp://guest:guest@rabbitmq:5672"
      ConnectionStrings__valkey: "valkey:6379"
      Jwt__Authority: "http://keycloak:8080/realms/ecommerce"
      Jwt__ValidateIssuer: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: fulfillment-api
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  auditing-api:
    image: ecommerce-auditing-api:latest
    build:
      context: .
      dockerfile: src/Services/Auditing/Auditing.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AuditingDb: "Host=postgres;Database=auditing_db;Username=postgres;Password=postgres"
      ConnectionStrings__rabbitmq: "amqp://guest:guest@rabbitmq:5672"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: auditing-api
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  gateway:
    image: ecommerce-gateway:latest
    build:
      context: .
      dockerfile: src/Gateways/ECommerce.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__valkey: "valkey:6379"
      Jwt__Authority: "http://keycloak:8080/realms/ecommerce"
      Jwt__ValidateIssuer: "false"
      ReverseProxy__Clusters__ordering-cluster__Destinations__destination1__Address: "http://ordering-api:8080"
      ReverseProxy__Clusters__inventory-cluster__Destinations__destination1__Address: "http://inventory-api:8080"
      ReverseProxy__Clusters__payments-cluster__Destinations__destination1__Address: "http://payments-api:8080"
      ReverseProxy__Clusters__fulfillment-cluster__Destinations__destination1__Address: "http://fulfillment-api:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: gateway
    ports:
      - "8080:8080"
    networks:
      - ecommerce-net

  # ─── Observability ────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus metrics endpoint
    networks:
      - ecommerce-net

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/slo_alerts.yml:/etc/prometheus/slo_alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ecommerce-net

